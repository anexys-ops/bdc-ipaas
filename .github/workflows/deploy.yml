name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            cd /opt/bdc-ipaas
            git pull origin main

            cd docker

            # ── Rebuild images ──────────────────────────────────────────────
            docker compose -f docker-compose.prod.yml build --no-cache frontend api

            # ── Supprimer les containers existants (ex-projet différent) ────
            # docker rm -f ignore l'erreur si le container n'existe pas
            docker rm -f anexys-nginx    2>/dev/null || true
            docker rm -f anexys-frontend 2>/dev/null || true
            docker rm -f anexys-api      2>/dev/null || true
            echo "🗑️  Containers supprimés"

            # ── Recréer avec la nouvelle config/images ──────────────────────
            docker compose -f docker-compose.prod.yml up -d --no-deps nginx
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps api

            echo "Deploy done: $(date)"
            docker ps --format 'table {{.Names}}\t{{.Status}}' | head -12
