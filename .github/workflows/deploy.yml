name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/bdc-ipaas

            # Reset local modifications, then pull
            git checkout -- .
            git pull origin main

            # ── Debug HOST nginx ───────────────────────────────────────────────
            echo "=== HOST nginx sites-enabled ==="
            ls /etc/nginx/sites-enabled/ 2>/dev/null || echo "(aucun)"
            grep -r "ultimate.edicloud.app\|root \|try_files\|proxy_pass" \
              /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | head -30 || true

            # ── Rebuild ────────────────────────────────────────────────────────
            cd docker
            docker compose -f docker-compose.prod.yml build --no-cache frontend api
            echo "✅ Build terminé"

            # ── Supprimer containers (bypass conflit de projet) ────────────────
            docker rm -f anexys-nginx    2>/dev/null || true
            docker rm -f anexys-frontend 2>/dev/null || true
            docker rm -f anexys-api      2>/dev/null || true
            echo "🗑️  Containers supprimés"

            # ── Recréer ────────────────────────────────────────────────────────
            docker compose -f docker-compose.prod.yml up -d --no-deps nginx frontend api
            echo "✅ Containers relancés"

            echo "=== docker ps ==="
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' | head -12

            echo "Deploy done: $(date)"
