            scp -o StrictHostKeyChecking=no /opt/bdc-ipaas/seo-pages/connecteur-ebp-cegid.html root@192.168.1.127:/var/www/ebp-cegid.ediconnect.fr/index.html
            scp -o StrictHostKeyChecking=no /opt/bdc-ipaas/seo-pages/connecteur-cegid-sap.html root@192.168.1.127:/var/www/cegid-sap.ediconnect.fr/index.html
            
            echo "=== Create nginx HTTP vhosts on CT127 ==="
            ssh root@192.168.1.127 "cat > /etc/nginx/sites-available/ebp-dolibarr.ediconnect.fr.conf << 'NGINX'
            server {
                listen 80;
                server_name ebp-dolibarr.ediconnect.fr;
                root /var/www/ebp-dolibarr.ediconnect.fr;
                index index.html;
                location / { try_files \$uri \$uri/ =404; }
            }
            NGINX
            ln -sf /etc/nginx/sites-available/ebp-dolibarr.ediconnect.fr.conf /etc/nginx/sites-enabled/ebp-dolibarr.ediconnect.fr.conf"
            ssh root@192.168.1.127 "cat > /etc/nginx/sites-available/sage-dolibarr.ediconnect.fr.conf << 'NGINX'
