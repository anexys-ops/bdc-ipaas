            scp -o StrictHostKeyChecking=no /opt/bdc-ipaas/seo-pages/taskit-cegid.html root@192.168.1.127:/var/www/cegid.taskit.fr/index.html
            scp -o StrictHostKeyChecking=no /opt/bdc-ipaas/seo-pages/taskit-odoo.html root@192.168.1.127:/var/www/odoo.taskit.fr/index.html
            scp -o StrictHostKeyChecking=no /opt/bdc-ipaas/seo-pages/taskit-sap.html root@192.168.1.127:/var/www/sap.taskit.fr/index.html
            scp -o StrictHostKeyChecking=no /opt/bdc-ipaas/seo-pages/connecteur-ebp-sage.html root@192.168.1.127:/var/www/ebp-sage.ediconnect.fr/index.html
