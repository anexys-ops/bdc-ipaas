name: Deploy CT127 SEO vhosts

on:
  workflow_dispatch:

jobs:
  deploy-ct127:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Diagnostic quickedi files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60s
          script: |
            
            echo "=== Files in seo-pages ==="
            ls /opt/bdc-ipaas/seo-pages/ | head -20
            echo "=== quickedi dir ==="
            ls /opt/bdc-ipaas/seo-pages/quickedi/ 2>/dev/null || echo "not found"
            echo "=== Docker mounts ==="
            docker inspect seo-nginx | python3 -c "import json,sys; d=json.load(sys.stdin); [print(m['Source'],'->',m['Destination']) for m in d[0]['Mounts']]"
            echo "=== nginx conf sage ==="
            cat /opt/bdc-ipaas/docker/nginx/seo-active-conf/sage.quickedi.fr.conf 2>/dev/null || echo "not found"
            echo "=== inside container ==="
            docker exec seo-nginx ls /var/www/connecteurs/quickedi/ 2>/dev/null || echo "not found in container"
            
