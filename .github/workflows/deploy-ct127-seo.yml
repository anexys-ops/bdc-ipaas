name: Deploy CT127 SEO vhosts

on:
  workflow_dispatch:

jobs:
  deploy-ct127:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy 20 SEO vhosts on CT127 via rack-57
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 1200s
          script: |
            set -e
            
            echo "=== SSH to CT127 and setup nginx ==="
            
            # First ensure we can reach CT127
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 root@192.168.1.127 "echo CT127 reachable"
            
            echo "=== Install nginx on CT127 ==="
            ssh root@192.168.1.127 "apt-get update -qq && apt-get install -y nginx curl 2>/dev/null || true"
            
            echo "=== Create web dirs on CT127 ==="
            ssh root@192.168.1.127 "mkdir -p /var/www/ebp-dolibarr.ediconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/sage-dolibarr.ediconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/cegid-dolibarr.ediconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/odoo-dolibarr.ediconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/sap-dolibarr.ediconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/prestashop-dolibarr.shopconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/woocommerce-dolibarr.shopconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/shopify-dolibarr.shopconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/magento-dolibarr.shopconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/amazon-dolibarr.shopconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/dolibarr.taskit.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/sage.taskit.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/cegid.taskit.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/odoo.taskit.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/sap.taskit.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/ebp-sage.ediconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/sage-sap.ediconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/odoo-sage.ediconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/ebp-cegid.ediconnect.fr"
            ssh root@192.168.1.127 "mkdir -p /var/www/cegid-sap.ediconnect.fr"
            
            echo "=== Copy HTML files from rack-57 to CT127 ==="
