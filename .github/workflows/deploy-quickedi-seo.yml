name: Deploy QuickEDI SEO pages

on:
  workflow_dispatch:

jobs:
  deploy-quickedi:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: SCP quickedi HTML files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "seo-pages/quickedi/"
          target: "/opt/bdc-ipaas/seo-pages/"
          strip_components: 1

      - name: Setup nginx vhosts + SSL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 600s
          script: |
            set -e
            
            echo "=== Create dirs in seo-nginx mount ==="
            mkdir -p /opt/bdc-ipaas/seo-pages/quickedi
            
            echo "=== Copy HTML files from runner (via SCP - files already on server from scp step) ==="
            # Files are copied by SCP step before this SSH step
            ls /opt/bdc-ipaas/seo-pages/quickedi/
            
            echo "=== Create nginx HTTP vhosts ==="
            mkdir -p /opt/bdc-ipaas/docker/nginx/seo-active-conf
            
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/sage.quickedi.fr.conf << 'NGINX'
            server {
                listen 80;
                server_name sage.quickedi.fr;
                root /var/www/connecteurs/quickedi;
                index sage.html;
                location = / { try_files /sage.html =404; }
                location / { try_files $uri $uri/ =404; }
                location /.well-known/acme-challenge/ { root /var/www/certbot; }
            }
            NGINX
            
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/cegid.quickedi.fr.conf << 'NGINX'
            server {
                listen 80;
                server_name cegid.quickedi.fr;
                root /var/www/connecteurs/quickedi;
                index cegid.html;
                location = / { try_files /cegid.html =404; }
                location / { try_files $uri $uri/ =404; }
                location /.well-known/acme-challenge/ { root /var/www/certbot; }
            }
            NGINX
            
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/ebp.quickedi.fr.conf << 'NGINX'
            server {
                listen 80;
                server_name ebp.quickedi.fr;
                root /var/www/connecteurs/quickedi;
                index ebp.html;
                location = / { try_files /ebp.html =404; }
                location / { try_files $uri $uri/ =404; }
                location /.well-known/acme-challenge/ { root /var/www/certbot; }
            }
            NGINX
            
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/odoo.quickedi.fr.conf << 'NGINX'
            server {
                listen 80;
                server_name odoo.quickedi.fr;
                root /var/www/connecteurs/quickedi;
                index odoo.html;
                location = / { try_files /odoo.html =404; }
                location / { try_files $uri $uri/ =404; }
                location /.well-known/acme-challenge/ { root /var/www/certbot; }
            }
            NGINX
            
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/dolibarr.quickedi.fr.conf << 'NGINX'
            server {
                listen 80;
                server_name dolibarr.quickedi.fr;
                root /var/www/connecteurs/quickedi;
                index dolibarr.html;
                location = / { try_files /dolibarr.html =404; }
                location / { try_files $uri $uri/ =404; }
                location /.well-known/acme-challenge/ { root /var/www/certbot; }
            }
            NGINX
            
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/sap.quickedi.fr.conf << 'NGINX'
            server {
                listen 80;
                server_name sap.quickedi.fr;
                root /var/www/connecteurs/quickedi;
                index sap.html;
                location = / { try_files /sap.html =404; }
                location / { try_files $uri $uri/ =404; }
