                server_name intermarche.quickedi.fr;
                root /var/www/connecteurs/quickedi;
                index intermarche.html;
                location = / { try_files /intermarche.html =404; }
                location / { try_files $uri $uri/ =404; }
                location /.well-known/acme-challenge/ { root /var/www/certbot; }
            }
            NGINX
            
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/leroy-merlin.quickedi.fr.conf << 'NGINX'
            server {
                listen 80;
                server_name leroy-merlin.quickedi.fr;
                root /var/www/connecteurs/quickedi;
                index leroy-merlin.html;
                location = / { try_files /leroy-merlin.html =404; }
                location / { try_files $uri $uri/ =404; }
                location /.well-known/acme-challenge/ { root /var/www/certbot; }
            }
            NGINX
            
            echo "=== Reload nginx HTTP ==="
            docker exec seo-nginx nginx -t && docker exec seo-nginx nginx -s reload
            sleep 2
            
            echo "=== Install acme.sh ==="
            [ -f /root/.acme.sh/acme.sh ] || (curl -sL https://get.acme.sh | sh -s email=commercial@anexys.fr && sleep 2)
            
            export IONOS_PREFIX=d2375a53d90e4be1bcbf03ce80141073
            export IONOS_SECRET=wYYqaiuSP07iSeP93FEotefvdYTTLW56zo44mrnhQr9l7ckvg1EEfZUZYEv0bNXZQ2PcC15cIcsSEjRtibV-wg
            
            echo "=== Issue SSL cert for quickedi.fr ==="
            /root/.acme.sh/acme.sh --issue --dns dns_ionos \
              -d sage.quickedi.fr -d cegid.quickedi.fr -d ebp.quickedi.fr \
              -d odoo.quickedi.fr -d dolibarr.quickedi.fr -d sap.quickedi.fr \
              -d carrefour.quickedi.fr -d leclerc.quickedi.fr -d auchan.quickedi.fr \
              -d systeme-u.quickedi.fr -d intermarche.quickedi.fr -d leroy-merlin.quickedi.fr \
              --server zerossl --keylength ec-256 \
              || echo "Note: cert may already exist"
            
            echo "=== Copy certs into docker mount ==="
            CERT_SRC="/root/.acme.sh/sage.quickedi.fr_ecc"
            CERT_DST="/opt/bdc-ipaas/docker/certbot/conf/live/sage.quickedi.fr"
            mkdir -p "$CERT_DST"
            cp "$CERT_SRC/fullchain.cer" "$CERT_DST/fullchain.pem"
            cp "$CERT_SRC/sage.quickedi.fr.key" "$CERT_DST/privkey.pem"
            cp "$CERT_SRC/ca.cer" "$CERT_DST/chain.pem"
            echo "Certs copied"
            
            echo "=== Switch to HTTPS vhosts ==="
            
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/sage.quickedi.fr.conf << 'NGINX'
            server {
                listen 80;
                server_name sage.quickedi.fr;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
                server_name sage.quickedi.fr;
                ssl_certificate /etc/letsencrypt/live/sage.quickedi.fr/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/sage.quickedi.fr/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_ciphers HIGH:!aNULL:!MD5;
                root /var/www/connecteurs/quickedi;
                index sage.html;
                location = / { try_files /sage.html =404; }
                location / { try_files $uri $uri/ =404; }
            }
            NGINX
            
