name: Deploy SEO Pages

on:
  workflow_dispatch:

jobs:
  deploy-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy 20 SEO landing pages
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 300s
          script: |
            set -e
            cd /opt/bdc-ipaas && git pull origin main

            echo "=== Create HTML directories ===" 
            mkdir -p /opt/bdc-ipaas/seo-pages/ebp-dolibarr.ediconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/sage-dolibarr.ediconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/cegid-dolibarr.ediconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/odoo-dolibarr.ediconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/sap-dolibarr.ediconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/quickbooks-dolibarr.ediconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/ebp-odoo.ediconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/sage-odoo.ediconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/cegid-odoo.ediconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/prestashop-dolibarr.shopconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/woocommerce-dolibarr.shopconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/shopify-dolibarr.shopconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/magento-dolibarr.shopconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/prestashop-odoo.shopconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/woocommerce-odoo.shopconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/shopify-odoo.shopconnect.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/dolibarr.taskit.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/odoo.taskit.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/ebp.taskit.fr
            mkdir -p /opt/bdc-ipaas/seo-pages/sage.taskit.fr

            echo "=== Copy HTML files ===" 
            cp /opt/bdc-ipaas/seo-pages/connecteur-ebp-dolibarr.html /opt/bdc-ipaas/seo-pages/ebp-dolibarr.ediconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/connecteur-sage-dolibarr.html /opt/bdc-ipaas/seo-pages/sage-dolibarr.ediconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/connecteur-cegid-dolibarr.html /opt/bdc-ipaas/seo-pages/cegid-dolibarr.ediconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/connecteur-odoo-dolibarr.html /opt/bdc-ipaas/seo-pages/odoo-dolibarr.ediconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/connecteur-sap-dolibarr.html /opt/bdc-ipaas/seo-pages/sap-dolibarr.ediconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/connecteur-quickbooks-dolibarr.html /opt/bdc-ipaas/seo-pages/quickbooks-dolibarr.ediconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/connecteur-ebp-odoo.html /opt/bdc-ipaas/seo-pages/ebp-odoo.ediconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/connecteur-sage-odoo.html /opt/bdc-ipaas/seo-pages/sage-odoo.ediconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/connecteur-cegid-odoo.html /opt/bdc-ipaas/seo-pages/cegid-odoo.ediconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/shopconnect-prestashop-dolibarr.html /opt/bdc-ipaas/seo-pages/prestashop-dolibarr.shopconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/shopconnect-woocommerce-dolibarr.html /opt/bdc-ipaas/seo-pages/woocommerce-dolibarr.shopconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/shopconnect-shopify-dolibarr.html /opt/bdc-ipaas/seo-pages/shopify-dolibarr.shopconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/shopconnect-magento-dolibarr.html /opt/bdc-ipaas/seo-pages/magento-dolibarr.shopconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/shopconnect-prestashop-odoo.html /opt/bdc-ipaas/seo-pages/prestashop-odoo.shopconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/shopconnect-woocommerce-odoo.html /opt/bdc-ipaas/seo-pages/woocommerce-odoo.shopconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/shopconnect-shopify-odoo.html /opt/bdc-ipaas/seo-pages/shopify-odoo.shopconnect.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/taskit-dolibarr.html /opt/bdc-ipaas/seo-pages/dolibarr.taskit.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/taskit-odoo.html /opt/bdc-ipaas/seo-pages/odoo.taskit.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/taskit-ebp.html /opt/bdc-ipaas/seo-pages/ebp.taskit.fr/index.html
            cp /opt/bdc-ipaas/seo-pages/taskit-sage.html /opt/bdc-ipaas/seo-pages/sage.taskit.fr/index.html

            echo "=== Free port 80 if occupied ===" 
            docker rm -f seo-nginx 2>/dev/null || true
            PORTUSER=
            if [ -n \ ]; then
              echo "Stopping container on port 80: "
              docker stop \ || true
            fi

            echo "=== Deploy HTTP nginx configs ===" 
            mkdir -p /opt/bdc-ipaas/docker/nginx/seo-active-conf
            mkdir -p /opt/bdc-ipaas/docker/certbot/conf
            mkdir -p /opt/bdc-ipaas/docker/certbot/www
            cp /opt/bdc-ipaas/docker/nginx/seo-conf.d-http/*.conf /opt/bdc-ipaas/docker/nginx/seo-active-conf/

            echo "=== Start SEO nginx (HTTP) ===" 
            cd /opt/bdc-ipaas/docker
            docker compose -f seo-docker-compose.yml up -d --remove-orphans
            sleep 4
            docker exec seo-nginx nginx -t
            echo "Nginx HTTP running on port 80"

            echo "=== Certbot: SSL for ediconnect.fr ===" 
            docker run --rm \
              -v /opt/bdc-ipaas/docker/certbot/conf:/etc/letsencrypt \
              -v /opt/bdc-ipaas/docker/certbot/www:/var/www/certbot \
              certbot/certbot certonly --webroot \
              -w /var/www/certbot --non-interactive --agree-tos \
              -m commercial@anexys.fr \
              -d ebp-dolibarr.ediconnect.fr \
              -d sage-dolibarr.ediconnect.fr \
              -d cegid-dolibarr.ediconnect.fr \
              -d odoo-dolibarr.ediconnect.fr \
              -d sap-dolibarr.ediconnect.fr \
              -d quickbooks-dolibarr.ediconnect.fr \
              -d ebp-odoo.ediconnect.fr \
              -d sage-odoo.ediconnect.fr \
              -d cegid-odoo.ediconnect.fr 2>&1 || echo "certbot ediconnect WARN"

            echo "=== Certbot: SSL for shopconnect.fr ===" 
            docker run --rm \
              -v /opt/bdc-ipaas/docker/certbot/conf:/etc/letsencrypt \
              -v /opt/bdc-ipaas/docker/certbot/www:/var/www/certbot \
              certbot/certbot certonly --webroot \
              -w /var/www/certbot --non-interactive --agree-tos \
              -m commercial@anexys.fr \
              -d prestashop-dolibarr.shopconnect.fr \
              -d woocommerce-dolibarr.shopconnect.fr \
              -d shopify-dolibarr.shopconnect.fr \
              -d magento-dolibarr.shopconnect.fr \
              -d prestashop-odoo.shopconnect.fr \
              -d woocommerce-odoo.shopconnect.fr \
              -d shopify-odoo.shopconnect.fr 2>&1 || echo "certbot shopconnect WARN"

            echo "=== Certbot: SSL for taskit.fr ===" 
            docker run --rm \
              -v /opt/bdc-ipaas/docker/certbot/conf:/etc/letsencrypt \
              -v /opt/bdc-ipaas/docker/certbot/www:/var/www/certbot \
              certbot/certbot certonly --webroot \
              -w /var/www/certbot --non-interactive --agree-tos \
              -m commercial@anexys.fr \
              -d dolibarr.taskit.fr \
              -d odoo.taskit.fr \
              -d ebp.taskit.fr \
              -d sage.taskit.fr 2>&1 || echo "certbot taskit WARN"

            echo "=== Enable HTTPS configs ===" 
            cp /opt/bdc-ipaas/docker/nginx/seo-conf.d-ssl/*.conf /opt/bdc-ipaas/docker/nginx/seo-active-conf/
            docker exec seo-nginx nginx -t && docker exec seo-nginx nginx -s reload || echo "HTTPS reload failed - check certs"

            echo "=== DONE ===" && date
            docker ps | grep seo-nginx
