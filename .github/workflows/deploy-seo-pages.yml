name: Deploy SEO Pages

on:
  push:
    paths:
      - 'seo-pages/**'
      - '.github/workflows/deploy-seo-pages.yml'
  workflow_dispatch:

jobs:
  deploy-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy SEO vhosts via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 300s
          script: |
            set -e
            cd /opt/bdc-ipaas
            git pull origin main
            
            mkdir -p /var/www/connecteurs
            
            declare -A PAGES=(
              ["ebp-dolibarr.ediconnect.fr"]="seo-pages/connecteur-ebp-dolibarr.html"
              ["sage-dolibarr.ediconnect.fr"]="seo-pages/connecteur-sage-dolibarr.html"
              ["cegid-dolibarr.ediconnect.fr"]="seo-pages/connecteur-cegid-dolibarr.html"
              ["odoo-dolibarr.ediconnect.fr"]="seo-pages/connecteur-odoo-dolibarr.html"
              ["sap-dolibarr.ediconnect.fr"]="seo-pages/connecteur-sap-dolibarr.html"
              ["quickbooks-dolibarr.ediconnect.fr"]="seo-pages/connecteur-quickbooks-dolibarr.html"
              ["ebp-odoo.ediconnect.fr"]="seo-pages/connecteur-ebp-odoo.html"
              ["sage-odoo.ediconnect.fr"]="seo-pages/connecteur-sage-odoo.html"
              ["cegid-odoo.ediconnect.fr"]="seo-pages/connecteur-cegid-odoo.html"
              ["prestashop-dolibarr.shopconnect.fr"]="seo-pages/shopconnect-prestashop-dolibarr.html"
              ["woocommerce-dolibarr.shopconnect.fr"]="seo-pages/shopconnect-woocommerce-dolibarr.html"
              ["shopify-dolibarr.shopconnect.fr"]="seo-pages/shopconnect-shopify-dolibarr.html"
              ["magento-dolibarr.shopconnect.fr"]="seo-pages/shopconnect-magento-dolibarr.html"
              ["prestashop-odoo.shopconnect.fr"]="seo-pages/shopconnect-prestashop-odoo.html"
              ["woocommerce-odoo.shopconnect.fr"]="seo-pages/shopconnect-woocommerce-odoo.html"
              ["shopify-odoo.shopconnect.fr"]="seo-pages/shopconnect-shopify-odoo.html"
              ["dolibarr.taskit.fr"]="seo-pages/taskit-dolibarr.html"
              ["odoo.taskit.fr"]="seo-pages/taskit-odoo.html"
              ["ebp.taskit.fr"]="seo-pages/taskit-ebp.html"
              ["sage.taskit.fr"]="seo-pages/taskit-sage.html"
            )
            
            for domain in "${!PAGES[@]}"; do
              src="${PAGES[$domain]}"
              dir="/var/www/connecteurs/$domain"
              mkdir -p "$dir"
              cp "/opt/bdc-ipaas/$src" "$dir/index.html"
              echo "  OK $domain"
            done
            
            for domain in "${!PAGES[@]}"; do
              conf="/etc/nginx/sites-available/$domain"
              cat > "$conf" << NGINXEOF
server {
    listen 80;
    listen [::]:80;
    server_name $domain;
    root /var/www/connecteurs/$domain;
    index index.html;
    charset utf-8;
    location / { try_files \$uri /index.html =404; }
}
NGINXEOF
              ln -sf "$conf" "/etc/nginx/sites-enabled/$domain" 2>/dev/null || true
            done
            
            nginx -t && systemctl reload nginx
            
            certbot certonly --nginx --non-interactive --agree-tos \
              -m commercial@anexys.fr \
              -d ebp-dolibarr.ediconnect.fr
              -d sage-dolibarr.ediconnect.fr
              -d cegid-dolibarr.ediconnect.fr
              -d odoo-dolibarr.ediconnect.fr
              -d sap-dolibarr.ediconnect.fr
              -d quickbooks-dolibarr.ediconnect.fr
              -d ebp-odoo.ediconnect.fr
              -d sage-odoo.ediconnect.fr
              -d cegid-odoo.ediconnect.fr
              -d prestashop-dolibarr.shopconnect.fr
              -d woocommerce-dolibarr.shopconnect.fr
              -d shopify-dolibarr.shopconnect.fr
              -d magento-dolibarr.shopconnect.fr
              -d prestashop-odoo.shopconnect.fr
              -d woocommerce-odoo.shopconnect.fr
              -d shopify-odoo.shopconnect.fr
              -d dolibarr.taskit.fr
              -d odoo.taskit.fr
              -d ebp.taskit.fr
              -d sage.taskit.fr \
              2>/dev/null || echo "certbot: some domains may need retry"
            
            for domain in "${!PAGES[@]}"; do
              certdir=$(ls -d /etc/letsencrypt/live/${domain}* 2>/dev/null | head -1)
              if [ -n "$certdir" ]; then
                cat > "/etc/nginx/sites-available/$domain" << SSLEOF
server {
    listen 80; server_name $domain; return 301 https://\$host\$request_uri;
}
server {
    listen 443 ssl http2;
    server_name $domain;
    root /var/www/connecteurs/$domain;
    index index.html;
    ssl_certificate $certdir/fullchain.pem;
    ssl_certificate_key $certdir/privkey.pem;
    ssl_stapling off;
    location / { try_files \$uri /index.html =404; }
}
SSLEOF
              fi
            done
            
            nginx -t && systemctl reload nginx
            echo "=== Deploy done ==="
            for domain in "${!PAGES[@]}"; do echo "  https://$domain"; done
