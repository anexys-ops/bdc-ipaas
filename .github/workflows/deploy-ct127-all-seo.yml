      - name: rack-57 SSL certs and seo-nginx proxy vhosts
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }
          port: ${{ secrets.SSH_PORT }
          username: ${{ secrets.SSH_USER }
          key: ${{ secrets.SSH_PRIVATE_KEY }
          command_timeout: 600s
          script: |
            set -e
            for f in /opt/bdc-ipaas/docker/nginx/seo-active-conf/*.quickedi.fr.conf /opt/bdc-ipaas/docker/nginx/seo-active-conf/*.bigdataconsulting.fr.conf; do [ -f "$f" ] && rm "$f"; done 2>/dev/null || true
            [ -f /root/.acme.sh/acme.sh ] || (curl -sL https://get.acme.sh | sh -s email=commercial@anexys.fr && sleep 3)
            export IONOS_PREFIX=d2375a53d90e4be1bcbf03ce80141073
            export IONOS_SECRET=wYYqaiuSP07iSeP93FEotefvdYTTLW56zo44mrnhQr9l7ckvg1EEfZUZYEv0bNXZQ2PcC15cIcsSEjRtibV-wg
            /root/.acme.sh/acme.sh --issue --dns dns_ionos -d sage.quickedi.fr -d cegid.quickedi.fr -d ebp.quickedi.fr -d odoo.quickedi.fr -d dolibarr.quickedi.fr -d sap.quickedi.fr -d carrefour.quickedi.fr -d leclerc.quickedi.fr -d auchan.quickedi.fr -d systeme-u.quickedi.fr -d intermarche.quickedi.fr -d leroy-merlin.quickedi.fr --server zerossl --keylength ec-256 || true
            /root/.acme.sh/acme.sh --issue --dns dns_ionos -d sage.bigdataconsulting.fr -d sap.bigdataconsulting.fr -d cegid.bigdataconsulting.fr -d dolibarr.bigdataconsulting.fr -d odoo.bigdataconsulting.fr -d ebp.bigdataconsulting.fr -d ipaas.bigdataconsulting.fr -d edi.bigdataconsulting.fr -d connecteur.bigdataconsulting.fr -d integration.bigdataconsulting.fr -d data.bigdataconsulting.fr -d migration.bigdataconsulting.fr --server zerossl --keylength ec-256 || true
            QDIR=/root/.acme.sh/sage.quickedi.fr_ecc
            BDIR=/root/.acme.sh/sage.bigdataconsulting.fr_ecc
            mkdir -p /opt/bdc-ipaas/docker/certbot/conf/live/sage.quickedi.fr /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr
            cp $QDIR/fullchain.cer /opt/bdc-ipaas/docker/certbot/conf/live/sage.quickedi.fr/fullchain.pem
            cp $QDIR/sage.quickedi.fr.key /opt/bdc-ipaas/docker/certbot/conf/live/sage.quickedi.fr/privkey.pem
            cp $BDIR/fullchain.cer /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/fullchain.pem
            cp $BDIR/sage.bigdataconsulting.fr.key /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/privkey.pem
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/sage.quickedi.fr.conf <<'NEOF'
            server {
                listen 80;
                server_name sage.quickedi.fr;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
                server_name sage.quickedi.fr;
                ssl_certificate /etc/letsencrypt/live/sage.quickedi.fr/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/sage.quickedi.fr/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                location / {
                    proxy_pass http://192.168.1.127;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
            }
            NEOF
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/cegid.quickedi.fr.conf <<'NEOF'
            server {
                listen 80;
                server_name cegid.quickedi.fr;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
                server_name cegid.quickedi.fr;
                ssl_certificate /etc/letsencrypt/live/sage.quickedi.fr/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/sage.quickedi.fr/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                location / {
                    proxy_pass http://192.168.1.127;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
            }
            NEOF
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/ebp.quickedi.fr.conf <<'NEOF'
            server {
                listen 80;
                server_name ebp.quickedi.fr;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
                server_name ebp.quickedi.fr;
                ssl_certificate /etc/letsencrypt/live/sage.quickedi.fr/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/sage.quickedi.fr/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                location / {
                    proxy_pass http://192.168.1.127;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
            }
            NEOF
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/odoo.quickedi.fr.conf <<'NEOF'
            server {
                listen 80;
                server_name odoo.quickedi.fr;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
