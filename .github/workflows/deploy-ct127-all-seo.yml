      - name: rack-57 SSL cert + proxy vhosts for BDC
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 600s
          script: |
            echo "=== STEP1 clean stale BDC vhosts ==="
            for f in /opt/bdc-ipaas/docker/nginx/seo-active-conf/*.bigdataconsulting.fr.conf; do [ -f "$f" ] && rm "$f" && echo "Removed $f"; done 2>/dev/null || true
            echo "=== STEP2 acme.sh check ==="
            [ -f ~/.acme.sh/acme.sh ] || (curl -s https://get.acme.sh | sh -s email=commercial@anexys.fr) || true
            echo "=== STEP3 issue BDC cert ==="
            IONOS_PREFIX=d2375a53d90e4be1bcbf03ce80141073 IONOS_SECRET=wYYqaiuSP07iSeP93FEotefvdYTTLW56zo44mrnhQr9l7ckvg1EEfZUZYEv0bNXZQ2PcC15cIcsSEjRtibV-wg ~/.acme.sh/acme.sh --issue --dns dns_ionos --dnssleep 30 -d sage.bigdataconsulting.fr -d sap.bigdataconsulting.fr -d cegid.bigdataconsulting.fr -d dolibarr.bigdataconsulting.fr -d odoo.bigdataconsulting.fr -d ebp.bigdataconsulting.fr -d ipaas.bigdataconsulting.fr -d edi.bigdataconsulting.fr -d connecteur.bigdataconsulting.fr -d integration.bigdataconsulting.fr -d data.bigdataconsulting.fr -d migration.bigdataconsulting.fr 2>&1 || echo "WARN: cert issue failed or already exists - continuing"
            echo "=== STEP4 install cert ==="
            mkdir -p /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr
            ~/.acme.sh/acme.sh --install-cert -d sage.bigdataconsulting.fr --fullchain-file /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/fullchain.pem --key-file /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/privkey.pem 2>&1 || echo "WARN: install-cert failed"
            echo "=== STEP5 placeholder cert if needed ==="
            [ -f /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/fullchain.pem ] || cp /opt/bdc-ipaas/docker/certbot/conf/live/ebp-dolibarr.ediconnect.fr/fullchain.pem /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/fullchain.pem 2>/dev/null || true
            [ -f /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/privkey.pem ] || cp /opt/bdc-ipaas/docker/certbot/conf/live/ebp-dolibarr.ediconnect.fr/privkey.pem /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/privkey.pem 2>/dev/null || true
            echo "=== STEP6 create nginx vhosts ==="
            echo "Creating sage.bigdataconsulting.fr.conf"
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/sage.bigdataconsulting.fr.conf <<'NEOF'
            server {
                listen 80;
                server_name sage.bigdataconsulting.fr;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
                server_name sage.bigdataconsulting.fr;
                ssl_certificate /etc/letsencrypt/live/sage.bigdataconsulting.fr/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/sage.bigdataconsulting.fr/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                location / {
                    proxy_pass http://192.168.1.127;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
            }
NEOF
            echo "Creating sap.bigdataconsulting.fr.conf"
            cat > /opt/bdc-ipaas/docker/nginx/seo-active-conf/sap.bigdataconsulting.fr.conf <<'NEOF'
