name: Deploy BDC SEO subdomains

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: SCP bdc HTML to CT127
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 192.168.1.127
          port: 22
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SSH_HOST }}
          proxy_port: ${{ secrets.SSH_PORT }}
          proxy_username: ${{ secrets.SSH_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "seo-pages/bdc/"
          target: /tmp/seo/
          strip_components: 1

      - name: CT127 nginx vhosts for BDC
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.1.127
          port: 22
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SSH_HOST }}
          proxy_port: ${{ secrets.SSH_PORT }}
          proxy_username: ${{ secrets.SSH_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 120s
          script: |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq && apt-get install -y nginx
            mkdir -p /var/www/sage.bigdataconsulting.fr
            mkdir -p /var/www/sap.bigdataconsulting.fr
            mkdir -p /var/www/cegid.bigdataconsulting.fr
            mkdir -p /var/www/dolibarr.bigdataconsulting.fr
            mkdir -p /var/www/odoo.bigdataconsulting.fr
            mkdir -p /var/www/ebp.bigdataconsulting.fr
            mkdir -p /var/www/ipaas.bigdataconsulting.fr
            mkdir -p /var/www/edi.bigdataconsulting.fr
            mkdir -p /var/www/connecteur.bigdataconsulting.fr
            mkdir -p /var/www/integration.bigdataconsulting.fr
            mkdir -p /var/www/data.bigdataconsulting.fr
            mkdir -p /var/www/migration.bigdataconsulting.fr
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIHNhZ2UuYmlnZGF0YWNvbnN1bHRpbmcuZnI7CiAgICByb290IC92YXIvd3d3L3NhZ2UuYmlnZGF0YWNvbnN1bHRpbmcuZnI7CiAgICBpbmRleCBpbmRleC5odG1sOwogICAgbG9jYXRpb24gLyB7IHRyeV9maWxlcyAkdXJpICR1cmkvID00MDQ7IH0KfQo=' | base64 -d > /etc/nginx/sites-available/sage.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/sage.bigdataconsulting.fr /etc/nginx/sites-enabled/sage.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/sage.html ] && cp /tmp/seo/bdc/sage.html /var/www/sage.bigdataconsulting.fr/index.html || true
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIHNhcC5iaWdkYXRhY29uc3VsdGluZy5mcjsKICAgIHJvb3QgL3Zhci93d3cvc2FwLmJpZ2RhdGFjb25zdWx0aW5nLmZyOwogICAgaW5kZXggaW5kZXguaHRtbDsKICAgIGxvY2F0aW9uIC8geyB0cnlfZmlsZXMgJHVyaSAkdXJpLyA9NDA0OyB9Cn0K' | base64 -d > /etc/nginx/sites-available/sap.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/sap.bigdataconsulting.fr /etc/nginx/sites-enabled/sap.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/sap.html ] && cp /tmp/seo/bdc/sap.html /var/www/sap.bigdataconsulting.fr/index.html || true
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIGNlZ2lkLmJpZ2RhdGFjb25zdWx0aW5nLmZyOwogICAgcm9vdCAvdmFyL3d3dy9jZWdpZC5iaWdkYXRhY29uc3VsdGluZy5mcjsKICAgIGluZGV4IGluZGV4Lmh0bWw7CiAgICBsb2NhdGlvbiAvIHsgdHJ5X2ZpbGVzICR1cmkgJHVyaS8gPTQwNDsgfQp9Cg==' | base64 -d > /etc/nginx/sites-available/cegid.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/cegid.bigdataconsulting.fr /etc/nginx/sites-enabled/cegid.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/cegid.html ] && cp /tmp/seo/bdc/cegid.html /var/www/cegid.bigdataconsulting.fr/index.html || true
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIGRvbGliYXJyLmJpZ2RhdGFjb25zdWx0aW5nLmZyOwogICAgcm9vdCAvdmFyL3d3dy9kb2xpYmFyci5iaWdkYXRhY29uc3VsdGluZy5mcjsKICAgIGluZGV4IGluZGV4Lmh0bWw7CiAgICBsb2NhdGlvbiAvIHsgdHJ5X2ZpbGVzICR1cmkgJHVyaS8gPTQwNDsgfQp9Cg==' | base64 -d > /etc/nginx/sites-available/dolibarr.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/dolibarr.bigdataconsulting.fr /etc/nginx/sites-enabled/dolibarr.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/dolibarr.html ] && cp /tmp/seo/bdc/dolibarr.html /var/www/dolibarr.bigdataconsulting.fr/index.html || true
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIG9kb28uYmlnZGF0YWNvbnN1bHRpbmcuZnI7CiAgICByb290IC92YXIvd3d3L29kb28uYmlnZGF0YWNvbnN1bHRpbmcuZnI7CiAgICBpbmRleCBpbmRleC5odG1sOwogICAgbG9jYXRpb24gLyB7IHRyeV9maWxlcyAkdXJpICR1cmkvID00MDQ7IH0KfQo=' | base64 -d > /etc/nginx/sites-available/odoo.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/odoo.bigdataconsulting.fr /etc/nginx/sites-enabled/odoo.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/odoo.html ] && cp /tmp/seo/bdc/odoo.html /var/www/odoo.bigdataconsulting.fr/index.html || true
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIGVicC5iaWdkYXRhY29uc3VsdGluZy5mcjsKICAgIHJvb3QgL3Zhci93d3cvZWJwLmJpZ2RhdGFjb25zdWx0aW5nLmZyOwogICAgaW5kZXggaW5kZXguaHRtbDsKICAgIGxvY2F0aW9uIC8geyB0cnlfZmlsZXMgJHVyaSAkdXJpLyA9NDA0OyB9Cn0K' | base64 -d > /etc/nginx/sites-available/ebp.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/ebp.bigdataconsulting.fr /etc/nginx/sites-enabled/ebp.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/ebp.html ] && cp /tmp/seo/bdc/ebp.html /var/www/ebp.bigdataconsulting.fr/index.html || true
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIGlwYWFzLmJpZ2RhdGFjb25zdWx0aW5nLmZyOwogICAgcm9vdCAvdmFyL3d3dy9pcGFhcy5iaWdkYXRhY29uc3VsdGluZy5mcjsKICAgIGluZGV4IGluZGV4Lmh0bWw7CiAgICBsb2NhdGlvbiAvIHsgdHJ5X2ZpbGVzICR1cmkgJHVyaS8gPTQwNDsgfQp9Cg==' | base64 -d > /etc/nginx/sites-available/ipaas.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/ipaas.bigdataconsulting.fr /etc/nginx/sites-enabled/ipaas.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/ipaas.html ] && cp /tmp/seo/bdc/ipaas.html /var/www/ipaas.bigdataconsulting.fr/index.html || true
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIGVkaS5iaWdkYXRhY29uc3VsdGluZy5mcjsKICAgIHJvb3QgL3Zhci93d3cvZWRpLmJpZ2RhdGFjb25zdWx0aW5nLmZyOwogICAgaW5kZXggaW5kZXguaHRtbDsKICAgIGxvY2F0aW9uIC8geyB0cnlfZmlsZXMgJHVyaSAkdXJpLyA9NDA0OyB9Cn0K' | base64 -d > /etc/nginx/sites-available/edi.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/edi.bigdataconsulting.fr /etc/nginx/sites-enabled/edi.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/edi.html ] && cp /tmp/seo/bdc/edi.html /var/www/edi.bigdataconsulting.fr/index.html || true
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIGNvbm5lY3RldXIuYmlnZGF0YWNvbnN1bHRpbmcuZnI7CiAgICByb290IC92YXIvd3d3L2Nvbm5lY3RldXIuYmlnZGF0YWNvbnN1bHRpbmcuZnI7CiAgICBpbmRleCBpbmRleC5odG1sOwogICAgbG9jYXRpb24gLyB7IHRyeV9maWxlcyAkdXJpICR1cmkvID00MDQ7IH0KfQo=' | base64 -d > /etc/nginx/sites-available/connecteur.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/connecteur.bigdataconsulting.fr /etc/nginx/sites-enabled/connecteur.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/connecteur.html ] && cp /tmp/seo/bdc/connecteur.html /var/www/connecteur.bigdataconsulting.fr/index.html || true
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIGludGVncmF0aW9uLmJpZ2RhdGFjb25zdWx0aW5nLmZyOwogICAgcm9vdCAvdmFyL3d3dy9pbnRlZ3JhdGlvbi5iaWdkYXRhY29uc3VsdGluZy5mcjsKICAgIGluZGV4IGluZGV4Lmh0bWw7CiAgICBsb2NhdGlvbiAvIHsgdHJ5X2ZpbGVzICR1cmkgJHVyaS8gPTQwNDsgfQp9Cg==' | base64 -d > /etc/nginx/sites-available/integration.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/integration.bigdataconsulting.fr /etc/nginx/sites-enabled/integration.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/integration.html ] && cp /tmp/seo/bdc/integration.html /var/www/integration.bigdataconsulting.fr/index.html || true
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIGRhdGEuYmlnZGF0YWNvbnN1bHRpbmcuZnI7CiAgICByb290IC92YXIvd3d3L2RhdGEuYmlnZGF0YWNvbnN1bHRpbmcuZnI7CiAgICBpbmRleCBpbmRleC5odG1sOwogICAgbG9jYXRpb24gLyB7IHRyeV9maWxlcyAkdXJpICR1cmkvID00MDQ7IH0KfQo=' | base64 -d > /etc/nginx/sites-available/data.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/data.bigdataconsulting.fr /etc/nginx/sites-enabled/data.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/data.html ] && cp /tmp/seo/bdc/data.html /var/www/data.bigdataconsulting.fr/index.html || true
            echo 'c2VydmVyIHsKICAgIGxpc3RlbiA4MDsKICAgIHNlcnZlcl9uYW1lIG1pZ3JhdGlvbi5iaWdkYXRhY29uc3VsdGluZy5mcjsKICAgIHJvb3QgL3Zhci93d3cvbWlncmF0aW9uLmJpZ2RhdGFjb25zdWx0aW5nLmZyOwogICAgaW5kZXggaW5kZXguaHRtbDsKICAgIGxvY2F0aW9uIC8geyB0cnlfZmlsZXMgJHVyaSAkdXJpLyA9NDA0OyB9Cn0K' | base64 -d > /etc/nginx/sites-available/migration.bigdataconsulting.fr
            ln -sf /etc/nginx/sites-available/migration.bigdataconsulting.fr /etc/nginx/sites-enabled/migration.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/migration.html ] && cp /tmp/seo/bdc/migration.html /var/www/migration.bigdataconsulting.fr/index.html || true
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx
            echo CT127_OK

      - name: rack-57 SSL cert + proxy vhosts for BDC
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 600s
          script_stop: false
          script: |
            set +e
            echo RACK57_START
            rm -f /opt/bdc-ipaas/docker/nginx/seo-active-conf/*.bigdataconsulting.fr.conf 2>/dev/null
            true
            echo RACK57_STEP2
            [ -f ~/.acme.sh/acme.sh ] || curl -s https://get.acme.sh | sh -s email=commercial@anexys.fr
            true
            echo RACK57_STEP3
            IONOS_PREFIX=d2375a53d90e4be1bcbf03ce80141073 IONOS_SECRET=wYYqaiuSP07iSeP93FEotefvdYTTLW56zo44mrnhQr9l7ckvg1EEfZUZYEv0bNXZQ2PcC15cIcsSEjRtibV-wg ~/.acme.sh/acme.sh --issue --dns dns_ionos --dnssleep 30 -d sage.bigdataconsulting.fr -d sap.bigdataconsulting.fr -d cegid.bigdataconsulting.fr -d dolibarr.bigdataconsulting.fr -d odoo.bigdataconsulting.fr -d ebp.bigdataconsulting.fr -d ipaas.bigdataconsulting.fr -d edi.bigdataconsulting.fr -d connecteur.bigdataconsulting.fr -d integration.bigdataconsulting.fr -d data.bigdataconsulting.fr -d migration.bigdataconsulting.fr 2>&1
            true
            echo RACK57_STEP4
            mkdir -p /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr
            ~/.acme.sh/acme.sh --install-cert -d sage.bigdataconsulting.fr --fullchain-file /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/fullchain.pem --key-file /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/privkey.pem 2>&1
            true
            echo RACK57_STEP5
            [ -f /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/fullchain.pem ] || cp /opt/bdc-ipaas/docker/certbot/conf/live/ebp-dolibarr.ediconnect.fr/fullchain.pem /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/fullchain.pem 2>/dev/null
            true
            [ -f /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/privkey.pem ] || cp /opt/bdc-ipaas/docker/certbot/conf/live/ebp-dolibarr.ediconnect.fr/privkey.pem /opt/bdc-ipaas/docker/certbot/conf/live/sage.bigdataconsulting.fr/privkey.pem 2>/dev/null
            true
            echo RACK57_STEP6
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/sage.bigdataconsulting.fr.conf
            true
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/sap.bigdataconsulting.fr.conf
            true
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/cegid.bigdataconsulting.fr.conf
            true
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/dolibarr.bigdataconsulting.fr.conf
            true
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/odoo.bigdataconsulting.fr.conf
            true
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/ebp.bigdataconsulting.fr.conf
            true
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/ipaas.bigdataconsulting.fr.conf
            true
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/edi.bigdataconsulting.fr.conf
            true
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/connecteur.bigdataconsulting.fr.conf
            true
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/integration.bigdataconsulting.fr.conf
            true
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/data.bigdataconsulting.fr.conf
            true
            echo '' | base64 -d > /opt/bdc-ipaas/docker/nginx/seo-active-conf/migration.bigdataconsulting.fr.conf
            true
            echo RACK57_STEP7
            docker exec seo-nginx nginx -t 2>&1
            true
            docker restart seo-nginx 2>&1
            true
            sleep 3
            true
            echo RACK57_DONE
            exit 0
