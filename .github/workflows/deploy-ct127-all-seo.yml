name: Deploy SEO subdomains quickedi + BDC on CT127

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Upload HTML to CT127
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 192.168.1.127
          port: 22
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }
          proxy_host: ${{ secrets.SSH_HOST }
          proxy_port: ${{ secrets.SSH_PORT }
          proxy_username: ${{ secrets.SSH_USER }
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }
          source: "seo-pages/quickedi/,seo-pages/bdc/"
          target: /tmp/seo/
          strip_components: 1

      - name: CT127 nginx setup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.1.127
          port: 22
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }
          proxy_host: ${{ secrets.SSH_HOST }
          proxy_port: ${{ secrets.SSH_PORT }
          proxy_username: ${{ secrets.SSH_USER }
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }
          command_timeout: 180s
          script: |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq && apt-get install -y nginx
            mkdir -p /var/www/sage.quickedi.fr
            mkdir -p /var/www/cegid.quickedi.fr
            mkdir -p /var/www/ebp.quickedi.fr
            mkdir -p /var/www/odoo.quickedi.fr
            mkdir -p /var/www/dolibarr.quickedi.fr
            mkdir -p /var/www/sap.quickedi.fr
            mkdir -p /var/www/carrefour.quickedi.fr
            mkdir -p /var/www/leclerc.quickedi.fr
            mkdir -p /var/www/auchan.quickedi.fr
            mkdir -p /var/www/systeme-u.quickedi.fr
            mkdir -p /var/www/intermarche.quickedi.fr
            mkdir -p /var/www/leroy-merlin.quickedi.fr
            mkdir -p /var/www/sage.bigdataconsulting.fr
            mkdir -p /var/www/sap.bigdataconsulting.fr
            mkdir -p /var/www/cegid.bigdataconsulting.fr
            mkdir -p /var/www/dolibarr.bigdataconsulting.fr
            mkdir -p /var/www/odoo.bigdataconsulting.fr
            mkdir -p /var/www/ebp.bigdataconsulting.fr
            mkdir -p /var/www/ipaas.bigdataconsulting.fr
            mkdir -p /var/www/edi.bigdataconsulting.fr
            mkdir -p /var/www/connecteur.bigdataconsulting.fr
            mkdir -p /var/www/integration.bigdataconsulting.fr
            mkdir -p /var/www/data.bigdataconsulting.fr
            mkdir -p /var/www/migration.bigdataconsulting.fr
            cat > /etc/nginx/sites-available/sage.quickedi.fr <<'NEOF'
            server {
                listen 80;
                server_name sage.quickedi.fr;
                root /var/www/sage.quickedi.fr;
                index index.html;
                location / { try_files $uri $uri/ =404; }
            }
            NEOF
            ln -sf /etc/nginx/sites-available/sage.quickedi.fr /etc/nginx/sites-enabled/sage.quickedi.fr
            [ -f /tmp/seo/quickedi/sage.html ] && cp /tmp/seo/quickedi/sage.html /var/www/sage.quickedi.fr/index.html || true
            cat > /etc/nginx/sites-available/cegid.quickedi.fr <<'NEOF'
            server {
                listen 80;
                server_name cegid.quickedi.fr;
                root /var/www/cegid.quickedi.fr;
                index index.html;
                location / { try_files $uri $uri/ =404; }
            }
            NEOF
            ln -sf /etc/nginx/sites-available/cegid.quickedi.fr /etc/nginx/sites-enabled/cegid.quickedi.fr
            [ -f /tmp/seo/quickedi/cegid.html ] && cp /tmp/seo/quickedi/cegid.html /var/www/cegid.quickedi.fr/index.html || true
            cat > /etc/nginx/sites-available/ebp.quickedi.fr <<'NEOF'
