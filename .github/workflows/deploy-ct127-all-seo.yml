name: Deploy BDC SEO subdomains on CT127

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: SCP bdc HTML to CT127
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 192.168.1.127
          port: 22
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SSH_HOST }}
          proxy_port: ${{ secrets.SSH_PORT }}
          proxy_username: ${{ secrets.SSH_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "seo-pages/bdc/"
          target: /tmp/seo/
          strip_components: 1

      - name: CT127 nginx vhosts for BDC
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.1.127
          port: 22
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SSH_HOST }}
          proxy_port: ${{ secrets.SSH_PORT }}
          proxy_username: ${{ secrets.SSH_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 120s
          script: |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq && apt-get install -y nginx
            mkdir -p /var/www/sage.bigdataconsulting.fr
            mkdir -p /var/www/sap.bigdataconsulting.fr
            mkdir -p /var/www/cegid.bigdataconsulting.fr
            mkdir -p /var/www/dolibarr.bigdataconsulting.fr
            mkdir -p /var/www/odoo.bigdataconsulting.fr
            mkdir -p /var/www/ebp.bigdataconsulting.fr
            mkdir -p /var/www/ipaas.bigdataconsulting.fr
            mkdir -p /var/www/edi.bigdataconsulting.fr
            mkdir -p /var/www/connecteur.bigdataconsulting.fr
            mkdir -p /var/www/integration.bigdataconsulting.fr
            mkdir -p /var/www/data.bigdataconsulting.fr
            mkdir -p /var/www/migration.bigdataconsulting.fr
            cat > /etc/nginx/sites-available/sage.bigdataconsulting.fr <<'NEOF'
            server {
                listen 80;
                server_name sage.bigdataconsulting.fr;
                root /var/www/sage.bigdataconsulting.fr;
                index index.html;
                location / { try_files $uri $uri/ =404; }
            }
NEOF
            ln -sf /etc/nginx/sites-available/sage.bigdataconsulting.fr /etc/nginx/sites-enabled/sage.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/sage.html ] && cp /tmp/seo/bdc/sage.html /var/www/sage.bigdataconsulting.fr/index.html || true
            cat > /etc/nginx/sites-available/sap.bigdataconsulting.fr <<'NEOF'
            server {
                listen 80;
                server_name sap.bigdataconsulting.fr;
                root /var/www/sap.bigdataconsulting.fr;
                index index.html;
                location / { try_files $uri $uri/ =404; }
            }
NEOF
            ln -sf /etc/nginx/sites-available/sap.bigdataconsulting.fr /etc/nginx/sites-enabled/sap.bigdataconsulting.fr
            [ -f /tmp/seo/bdc/sap.html ] && cp /tmp/seo/bdc/sap.html /var/www/sap.bigdataconsulting.fr/index.html || true
            cat > /etc/nginx/sites-available/cegid.bigdataconsulting.fr <<'NEOF'
            server {
                listen 80;
                server_name cegid.bigdataconsulting.fr;
                root /var/www/cegid.bigdataconsulting.fr;
                index index.html;
                location / { try_files $uri $uri/ =404; }
