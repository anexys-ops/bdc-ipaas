name: Debug BDC nginx mounts

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60s
          script_stop: false
          script: |
            echo "=== host port 443 ==="
            ss -tlnp | grep :443 || netstat -tlnp | grep :443 2>/dev/null
            echo "=== host nginx ==="
            which nginx 2>/dev/null && nginx -t 2>&1 || echo "no host nginx"
            echo "=== seo-nginx ports ==="
            docker inspect seo-nginx --format "{{range .NetworkSettings.Ports}}{{.}} {{end}}" 2>&1
            docker port seo-nginx 2>&1
            echo "=== sage.quickedi.fr conf ==="
            docker exec seo-nginx cat /etc/nginx/conf.d/sage.quickedi.fr.conf 2>&1
            echo "=== nginx errors ==="
            docker exec seo-nginx cat /var/log/nginx/error.log 2>&1 | tail -20
            echo DONE4
