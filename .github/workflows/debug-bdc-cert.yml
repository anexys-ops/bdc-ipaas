name: Debug BDC nginx mounts

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60s
          script_stop: false
          script: |
            echo "=== docker inspect volumes ==="
            docker inspect seo-nginx 2>&1 | python3 -c "import json,sys; d=json.load(sys.stdin); [print(m["Source"],"->",m["Destination"]) for m in d[0]["Mounts"]]"
            echo "=== conf.d contents ==="
            docker exec seo-nginx ls /etc/nginx/conf.d/ 2>&1
            echo "=== nginx -T full includes ==="
            docker exec seo-nginx nginx -T 2>&1 | grep -E "include|conf" | head -30
            echo DONE2
