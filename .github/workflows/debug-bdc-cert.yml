name: Debug BDC nginx mounts

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 120s
          script_stop: false
          script: |
            echo "=== CT100 proxy type ==="
            pct exec 100 -- which nginx 2>&1
            pct exec 100 -- which haproxy 2>&1
            pct exec 100 -- which caddy 2>&1
            pct exec 100 -- ps aux 2>&1 | head -20
            echo "=== CT100 nginx sites ==="
            pct exec 100 -- ls /etc/nginx/sites-enabled/ 2>&1
            pct exec 100 -- ls /etc/nginx/conf.d/ 2>&1
            echo "=== CT100 nginx config for gate.edicloud ==="
            pct exec 100 -- grep -r "gate.edicloud" /etc/nginx/ 2>&1 | head -5
            pct exec 100 -- grep -r "server_name" /etc/nginx/sites-enabled/ 2>&1 | head -30
            echo "=== CT100 port 443 ==="
            pct exec 100 -- ss -tlnp 2>&1 | grep :443
            echo DONE7
