name: Debug BDC nginx mounts

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60s
          script_stop: false
          script: |
            echo "=== sage conf content ==="
            cat /opt/bdc-ipaas/docker/nginx/seo-active-conf/sage.bigdataconsulting.fr.conf
            echo "=== cert inside container ==="
            docker exec seo-nginx ls -la /etc/letsencrypt/live/sage.bigdataconsulting.fr/ 2>&1 || echo "PATH NOT FOUND INSIDE CONTAINER"
            echo "=== docker mounts ==="
            docker inspect seo-nginx --format "{{range .Mounts}}{{.Source}} -> {{.Destination}}\n{{end}}" 2>&1
            echo DONE3
