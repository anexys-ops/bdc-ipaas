name: Debug BDC nginx mounts

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 120s
          script_stop: false
          script: |
            echo "=== ALL CONTAINERS with :443 ==="
            docker ps --format "{{.Names}}\t{{.Ports}}" | grep 443
            echo "=== iptables DNAT :443 ==="
            iptables -t nat -L -n | grep -A2 -B2 ":443" 2>&1 | head -40
            echo "=== seo-nginx container inspect network ==="
            docker inspect seo-nginx --format "{{range $k,$v := .NetworkSettings.Ports}}{{$k}} -> {{$v}}{{end}}" 2>&1
            echo "=== openssl from rack-57 external IP ==="
            echo | openssl s_client -connect 86.104.252.66:443 -servername sage.bigdataconsulting.fr 2>/dev/null | openssl x509 -noout -subject 2>&1
            echo | openssl s_client -connect 86.104.252.66:443 -servername gate.edicloud.app 2>/dev/null | openssl x509 -noout -subject 2>&1
            echo DONE6
