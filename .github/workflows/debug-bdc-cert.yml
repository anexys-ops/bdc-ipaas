name: Debug BDC nginx mounts

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Debug
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 120s
          script_stop: false
          script: |
            echo "=== quickedi cert files ==="
            docker exec seo-nginx ls -la /etc/letsencrypt/live/sage.quickedi.fr/ 2>&1
            echo "=== bdc cert files ==="
            docker exec seo-nginx ls -la /etc/letsencrypt/live/sage.bigdataconsulting.fr/ 2>&1
            echo "=== seo-nginx recent logs ==="
            docker logs seo-nginx 2>&1 | tail -30
            echo "=== RESTARTING seo-nginx ==="
            docker restart seo-nginx
            echo "Restart done, sleeping 5s"
            sleep 5
            echo "=== Testing cert after restart ==="
            echo | openssl s_client -connect 127.0.0.1:443 -servername sage.quickedi.fr 2>/dev/null | openssl x509 -noout -subject 2>&1
            echo | openssl s_client -connect 127.0.0.1:443 -servername sage.bigdataconsulting.fr 2>/dev/null | openssl x509 -noout -subject 2>&1
            echo DONE5
