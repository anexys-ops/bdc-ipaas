    <!-- Structured Data — FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Qu'est-ce qu'un iPaaS ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un iPaaS (Integration Platform as a Service) est une plateforme cloud qui connecte des applications et systèmes d'information hétérogènes sans développement complexe. Ultimate Edicloud est l'iPaaS français spécialisé dans l'EDI, les ERP Sage et CEGID, et l'e-commerce."
          }
        },
        {
          "@type": "Question",
          "name": "La marketplace de connecteurs est-elle accessible sans compte ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. La marketplace Ultimate Edicloud est entièrement publique sur https://ultimate.edicloud.app/marketplace — aucune inscription ni connexion requise pour parcourir les +50 connecteurs disponibles."
          }
        },
        {
          "@type": "Question",
          "name": "Quels ERP sont compatibles avec Ultimate Edicloud ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ultimate Edicloud est compatible avec Sage 100, Sage X3, CEGID, SAP, Odoo, EBP et Dolibarr. Des connecteurs supplémentaires sont disponibles sur demande."
          }
        },
        {
          "@type": "Question",
          "name": "Ultimate Edicloud peut-il connecter Sage à Shopify ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, la synchronisation Sage ↔ Shopify est un cas d'usage standard : stocks, commandes, produits et prix synchronisés en temps réel, bidirectionnellement."
          }
        },
        {
          "@type": "Question",
          "name": "Ultimate Edicloud est-il conforme RGPD ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Ultimate Edicloud est hébergé exclusivement en France dans des datacenters souverains. Aucun transfert de données hors UE. Conformité RGPD native."
          }
        }
      ]
    }
    </script>

    <!-- Structured Data — SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "@id": "https://ultimate.edicloud.app/#app",
          "name": "Ultimate Edicloud",
          "alternateName": "Ultimate — Le Connecteur",
          "applicationCategory": "BusinessApplication",
          "applicationSubCategory": "iPaaS, ERP Integration, EDI, Data Integration",
          "operatingSystem": "Web",
          "url": "https://ultimate.edicloud.app",
          "description": "Plateforme iPaaS française pour automatiser les échanges de données entre ERP, e-commerce, CRM et systèmes EDI",
          "inLanguage": "fr",
          "offers": {
            "@type": "Offer",
            "category": "SaaS",
            "priceCurrency": "EUR",
            "availability": "https://schema.org/InStock"
          },
          "featureList": [
            "99 connecteurs prêts à l'emploi (ERP, e-commerce, CRM, POS, comptabilité, EDI, paiement)",
            "Connecteurs ERP : Sage 100, Sage X3, CEGID Loop, CEGID Retail, CEGID Revo, EBP, Dolibarr, Odoo, Microsoft Dynamics 365, a3ERP, Afas, Exact, DATEV",
            "Connecteurs e-commerce : Shopify, WooCommerce, PrestaShop, Amazon",
            "Connecteurs CRM/Marketing : HubSpot, Salesforce, Sellsy, Axonaut, Pipedrive, Mailchimp",
            "Connecteurs POS/Caisse : Lightspeed, L'Addition, Zelty, Hiboutik, Cegid Revo, Fastmag, HelloCash, Clyo, Innovorder",
            "Connecteurs Comptabilité : MyUnisoft, Pennylane, QuickBooks, Xero, Inqom, Horus, FreeAgent",
            "Connecteurs Paiement : Stripe, Qonto, GoCardless",
            "Flux EDI : EDIFACT, AS2, SFTP, GS1 grande distribution",
            "Supervision temps réel et ETL sans code",
            "Hébergement France souverain RGPD"
          ],
          "provider": {
            "@type": "Organization",
            "@id": "https://anexys.fr/#org",
            "name": "ANEXYS",
            "url": "https://anexys.fr",
            "logo": "https://ultimate.edicloud.app/favicon.svg"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://ultimate.edicloud.app/#website",
          "url": "https://ultimate.edicloud.app",
          "name": "Ultimate Edicloud",
          "description": "Plateforme iPaaS pour l'intégration ERP, EDI et e-commerce",
          "inLanguage": "fr",
          "publisher": {"@id": "https://anexys.fr/#org"},
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://ultimate.edicloud.app/marketplace?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
