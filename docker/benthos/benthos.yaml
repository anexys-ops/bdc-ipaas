http:
  enabled: true
  address: 0.0.0.0:4195

input:
  broker:
    inputs:
      - generate:
          interval: "@every 60s"
          mapping: |
            meta benthos_kind = "heartbeat"
            root = {"ts": timestamp_unix(), "source": "benthos", "kind": "heartbeat"}

      - http_server:
          path: /hook/{product}
          allowed_verbs: [POST, PUT, GET]

      - http_server:
          path: /http/{source}/{doc_type}
          allowed_verbs: [POST, PUT]

      - http_server:
          path: /as2/{partner}
          allowed_verbs: [POST]

pipeline:
  processors:
    - mapping: |
        meta message_id  = uuid_v4()
        meta client_id   = meta("X-Client-Id").or("unknown")
        meta token       = meta("X-Gate-Token").or("").slice(0, 24)
        meta route       = meta("X-Route").or("default")
        meta received_at = now().format_timestamp("2006-01-02T15:04:05Z")
        meta valid       = if meta("X-Gate-Token") != "" { "true" } else { "false" }
        meta auth_type   = if meta("X-Gate-Token") != "" { "token" } else { "none" }
        root = content().string().slice(0, 2048)

output:
  switch:
    cases:
      - check: '@benthos_kind == "heartbeat"'
        output:
          redis_list:
            url: redis://redis:6379
            key: benthos_heartbeat

      - output:
          redis_streams:
            url: redis://redis:6379
            stream: ingress:global
            body_key: body
            max_length: 50000
            metadata:
              exclude_prefixes: ["X-", "Content", "Accept", "User", "benthos", "product", "source", "doc_type", "partner"]
