version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../ssl:/etc/ssl:ro
    depends_on: [api, frontend]
    networks:
      - anexys-network

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: https://app.anexys.fr/api
    networks:
      - anexys-network

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file: ../.env
    volumes:
      - ../connectors:/app/connectors
    depends_on: [postgres-master, redis]
    ports:
      - "3000:3000"
    networks:
      - anexys-network

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: node dist/worker.js
    env_file: ../.env
    deploy:
      replicas: 2
    depends_on: [postgres-master, redis]
    networks:
      - anexys-network

  postgres-master:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anexys_master
      POSTGRES_USER: anexys
      POSTGRES_PASSWORD: ${DB_PASSWORD:-anexys_dev_password}
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - anexys-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anexys -d anexys_master"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - anexys-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - anexys-network

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    networks:
      - anexys-network

networks:
  anexys-network:
    driver: bridge

volumes:
  postgres_master_data:
  redis_data:
  grafana_data:
