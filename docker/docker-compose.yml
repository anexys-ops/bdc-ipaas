services:
  nginx:
    image: nginx:alpine
    container_name: anexys-nginx
    ports:
      - "80:80"
      # Pas de listen 443 dans nginx.conf (TLS terminé en amont ou à ajouter avec certificats dans ./nginx/ssl).
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    networks:
      - anexys-network
    restart: unless-stopped

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: anexys-frontend
    environment:
      # URL relative pour que le navigateur envoie les requêtes au même domaine ; nginx proxy /api/ vers l'API.
      - VITE_API_URL=/api/v1
    depends_on:
      - api
    networks:
      - anexys-network
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      target: migrator
    container_name: anexys-migrate
    environment:
      - DATABASE_URL=postgresql://anexys:${DB_PASSWORD}@postgres:5432/anexys_master
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - anexys-network
    profiles:
      - tools

  seed-demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      target: builder
    container_name: anexys-seed-demo
    command: sh -c "cd /app/apps/api && npx ts-node scripts/seed-demo-data.ts"
    environment:
      - DATABASE_URL=postgresql://anexys:${DB_PASSWORD}@postgres:5432/anexys_master
      - VAULT_KEY=${VAULT_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - SEED_FROM_DOCKER=1
      - PRISMA_QUERY_ENGINE_LIBRARY=/app/apps/api/src/generated/master/libquery_engine-linux-musl-openssl-3.0.x.so.node
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - anexys-network
    profiles:
      - tools

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: anexys-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - CONNECTORS_PATH=/app/connectors
      - DATABASE_URL=postgresql://anexys:${DB_PASSWORD}@postgres:5432/anexys_master
      - REDIS_URL=redis://redis:6379
      - BENTHOS_HTTP_URL=${BENTHOS_HTTP_URL:-http://benthos:4195}
      - BENTHOS_REDIS_HEARTBEAT_KEY=${BENTHOS_REDIS_HEARTBEAT_KEY:-benthos_heartbeat}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - VAULT_KEY=${VAULT_KEY}
      # Forcer le moteur Prisma OpenSSL 3 sur Alpine
      - PRISMA_QUERY_ENGINE_LIBRARY=/app/apps/api/dist/generated/master/libquery_engine-linux-musl-openssl-3.0.x.so.node
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../connectors:/app/connectors:ro
      - pipeline_data:/pipeline
    networks:
      - anexys-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/marketplace"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: anexys-worker
    command: ["node", "dist/worker.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://anexys:${DB_PASSWORD}@postgres:5432/anexys_master
      - REDIS_URL=redis://redis:6379
      - VAULT_KEY=${VAULT_KEY}
      # Forcer le moteur Prisma OpenSSL 3 sur Alpine (détection sinon "linux-musl" → libssl.so.1.1)
      - PRISMA_QUERY_ENGINE_LIBRARY=/app/apps/api/dist/generated/master/libquery_engine-linux-musl-openssl-3.0.x.so.node
    volumes:
      - pipeline_data:/pipeline
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - anexys-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: anexys-postgres
    environment:
      - POSTGRES_USER=anexys
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=anexys_master
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - anexys-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anexys -d anexys_master"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anexys-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - anexys-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Pipeline Benthos (heartbeat JSON → liste Redis), HTTP /ping pour supervision.
  benthos:
    image: jeffail/benthos:4.27.0
    container_name: anexys-benthos
    volumes:
      - ./benthos/benthos.yaml:/benthos.yaml:ro
      - pipeline_data:/pipeline
    command: ["-c", "/benthos.yaml"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - anexys-network
    restart: unless-stopped
    ports:
      - "4195:4195"

  # FTP de test (profil e2e) — dépôt des exports CSV du moteur.
  ftp-test:
    image: fauria/vsftpd
    container_name: anexys-ftp-test
    profiles:
      - e2e
    environment:
      FTP_USER: anexys
      FTP_PASS: anexys
      PASV_ADDRESS: ftp-test
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
    ports:
      - "2121:21"
      - "21100-21110:21100-21110"
    networks:
      - anexys-network
    restart: unless-stopped

networks:
  anexys-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  pipeline_data:
