# Production — à lancer depuis la racine du repo (contexte build = .)
services:
  postgres:
    image: postgres:16-alpine
    container_name: anexys-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anexys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-anexys_master}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anexys} -d ${POSTGRES_DB:-anexys_master}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: anexys-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  benthos:
    image: jeffail/benthos:4.27.0
    container_name: anexys-benthos
    volumes:
      - ./benthos/benthos.yaml:/benthos.yaml:ro
      - pipeline_data:/pipeline
    command: ["-c", "/benthos.yaml"]
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped

  # Keycloak (BDC-99) — https://auth.edicloud.app — realm `anexys` importé au premier démarrage
  keycloak:
    image: docker.io/keycloak/keycloak:26.0
    container_name: anexys-keycloak
    command: ["start", "--import-realm"]
    env_file:
      - ../.env.production
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-anexys}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: https://auth.edicloud.app
      KC_HOSTNAME_STRICT: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      target: migrator
    container_name: anexys-migrate
    env_file: ../.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-anexys}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anexys_master}
    depends_on:
      postgres: { condition: service_healthy }
    profiles:
      - tools

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: anexys-api
    env_file: ../.env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-anexys}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anexys_master}
      REDIS_URL: redis://redis:6379
      BENTHOS_HTTP_URL: ${BENTHOS_HTTP_URL:-https://gate.edicloud.app}
      BENTHOS_REDIS_HEARTBEAT_KEY: ${BENTHOS_REDIS_HEARTBEAT_KEY:-benthos_heartbeat}
      FRONTEND_URL: ${FRONTEND_URL:-https://ultimate.edicloud.app}
      CONNECTORS_PATH: /app/connectors
      # Forcer le moteur Prisma OpenSSL 3 sur Alpine (évite libssl.so.1.1)
      PRISMA_QUERY_ENGINE_LIBRARY: /app/apps/api/dist/generated/master/libquery_engine-linux-musl-openssl-3.0.x.so.node
      VAULT_KEY: ${VAULT_KEY}
      # SMTP Gmail pour envoi des demandes de démo vers commercial@anexys.fr
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-Ultimate Edicloud <machine@anexys.fr>}
      DEMO_MAIL_TO: ${DEMO_MAIL_TO:-commercial@anexys.fr}
    volumes:
      - ../connectors:/app/connectors:ro
      - pipeline_data:/pipeline
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: anexys-worker
    command: ["node", "dist/worker.js"]
    env_file: ../.env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-anexys}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anexys_master}
      REDIS_URL: redis://redis:6379
      VAULT_KEY: ${VAULT_KEY}
      PRISMA_QUERY_ENGINE_LIBRARY: /app/apps/api/dist/generated/master/libquery_engine-linux-musl-openssl-3.0.x.so.node
    volumes:
      - pipeline_data:/pipeline
    depends_on:
      redis: { condition: service_healthy }
      api: { condition: service_started }
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-}
    container_name: anexys-frontend
    # Injecté à l’exécution : l’entrypoint génère /keycloak-env.js (SSO sans dépendre du seul build Vite).
    env_file:
      - ../.env.production
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: anexys-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
      - keycloak
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  pipeline_data:
