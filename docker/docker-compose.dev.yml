version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: anexys-postgres-dev
    environment:
      - POSTGRES_USER=anexys
      - POSTGRES_PASSWORD=anexys_dev_password
      - POSTGRES_DB=anexys_master
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anexys -d anexys_master"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anexys-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  redis_dev_data:
