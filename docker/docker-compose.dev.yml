version: '3.9'

services:
  postgres-master:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anexys_master
      POSTGRES_USER: anexys
      POSTGRES_PASSWORD: anexys_dev_password
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anexys -d anexys_master"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_master_data:
  redis_data:
