# =============================================================================
# nginx.conf — Proxy interne Docker pour ultimate.edicloud.app
# Rack-57 (86.104.252.66) — VM 192.168.1.113
# =============================================================================
#
# ⚠️  RÈGLE CRITIQUE — NE PAS MODIFIER les proxy_pass (Cursor, IA, humain) ⚠️
#
#  Toutes les directives proxy_pass utilisent une variable ($pass_*) pour que
#  nginx résolve les noms Docker via le DNS interne (127.0.0.11) au runtime.
#
#  CONSÉQUENCE OBLIGATOIRE : avec une variable dans proxy_pass, nginx ne doit
#  PAS avoir de chemin (trailing "/") après la variable.
#
#  ✅  proxy_pass http://$pass_api;          ← nginx passe l'URI original tel quel
#  ❌  proxy_pass http://$pass_api/api/;     ← nginx envoie "/" : page blanche/404
#  ❌  proxy_pass http://$pass_fe/;          ← même bug : tout reçoit "/"
#
#  Référence : https://nginx.org/en/docs/http/ngx_http_proxy_module.html
#  (section "If the proxy_pass directive is specified with a URI")
#
# Keycloak (SSO) : prod sur auth.bigdataconsulting.fr → rack-56 (86.104.252.67)
#   Le bloc keycloak ci-dessous gère auth.bigdataconsulting.fr (alias LAN/dev).
#   La production utilise VITE_KEYCLOAK_URL=https://auth.bigdataconsulting.fr
#
# Benthos : conteneur local "benthos:4195" — EDI Gateway sur gate.edicloud.app
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # DNS Docker interne — résolution au runtime, évite "upstream not found" au démarrage
    resolver 127.0.0.11 valid=5s ipv6=off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    # -------------------------------------------------------------------------
    # ultimate.edicloud.app — Frontend React + API NestJS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name ultimate.edicloud.app _;

        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # API NestJS (global prefix /api) — ⚠️ PAS de chemin après $pass_api
        # nginx transmet l'URI complet (/api/v1/...) tel quel au backend
        location /api/ {
            set $pass_api api:3000;
            proxy_pass http://$pass_api;   # ← NE PAS ajouter /api/ ici
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffering off;
        }

        # WebSocket (Socket.IO) — même backend que /api/
        location /socket.io/ {
            set $pass_api api:3000;
            proxy_pass http://$pass_api;   # ← NE PAS ajouter /socket.io/ ici
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # Frontend React (SPA) — ⚠️ PAS de trailing "/" après $pass_fe
        # Sans le "/", nginx passe l'URI original ; avec "/", tout reçoit "/" → page blanche
        location / {
            set $pass_fe frontend:80;
            proxy_pass http://$pass_fe;    # ← NE PAS ajouter "/" ici
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # -------------------------------------------------------------------------
    # auth.bigdataconsulting.fr — Keycloak (alias LAN/dev)
    # NOTA : la production utilise auth.bigdataconsulting.fr → rack-56 (86.104.252.67)
    # Ce bloc sert auth.bigdataconsulting.fr si le DNS pointe ici (développement).
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name auth.bigdataconsulting.fr;

        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Keycloak — ⚠️ PAS de trailing "/" après $pass_kc
        # X-Forwarded-Proto https requis pour que Keycloak génère les bons redirect URIs
        location / {
            set $pass_kc keycloak:8080;
            proxy_pass http://$pass_kc;    # ← NE PAS ajouter "/" ici
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_buffer_size    128k;
            proxy_buffers        4 256k;
            proxy_busy_buffers_size 256k;
            proxy_connect_timeout 120s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }
    }

    # -------------------------------------------------------------------------
    # gate.edicloud.app — Benthos EDI Gateway (conteneur local benthos:4195)
    # DNS : gate.edicloud.app → 86.104.252.66 (ce serveur)
    # Port 4195 = HTTP Benthos (routes /ready, /ping, flux EDI entrants)
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name gate.edicloud.app;
        client_max_body_size 50M;

        # Sonde de disponibilité Benthos (utilisée par la UI backoffice)
        location /ready {
            set $pass_benthos benthos:4195;
            proxy_pass http://$pass_benthos;   # ← NE PAS ajouter /ready ici
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout    5s;
            access_log off;
        }

        # Ping Benthos
        location /ping {
            set $pass_benthos benthos:4195;
            proxy_pass http://$pass_benthos;   # ← NE PAS ajouter /ping ici
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout    5s;
            access_log off;
        }

        # Tous les flux EDI entrants (HTTP/webhook/AS2/SFTP)
        location / {
            set $pass_benthos benthos:4195;
            proxy_pass http://$pass_benthos;   # ← NE PAS ajouter "/" ici
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
            proxy_buffering off;
        }
    }
}
