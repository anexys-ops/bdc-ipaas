server {
    listen 80;
    server_name odoo-dolibarr.ediconnect.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name odoo-dolibarr.ediconnect.fr;

    ssl_certificate     /etc/letsencrypt/live/ebp-dolibarr.ediconnect.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ebp-dolibarr.ediconnect.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/connecteurs/odoo-dolibarr.ediconnect.fr;
    index index.html;
    charset utf-8;

    location / {
        try_files $uri /index.html =404;
    }

    location ~* \.(html|css|js|ico|png|jpg|svg)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}
