server {
    listen 80;
    server_name woocommerce-odoo.shopconnect.fr;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
server {
    listen 443 ssl;
    server_name woocommerce-odoo.shopconnect.fr;
    ssl_certificate     /etc/letsencrypt/live/prestashop-dolibarr.shopconnect.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prestashop-dolibarr.shopconnect.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    root /var/www/connecteurs/woocommerce-odoo.shopconnect.fr;
    index index.html;
    charset utf-8;
    location / {
        try_files $uri /index.html =404;
    }
    location ~* \.(html|css|js|ico|png|jpg|svg)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}
